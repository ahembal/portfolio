apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metadata-ingestion
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ahembal/portfolio
    targetRevision: HEAD
    path: p2-metadata-ingestion/helm/metadata-ingestion
  destination:
    server: https://kubernetes.default.svc
    namespace: metadata
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
