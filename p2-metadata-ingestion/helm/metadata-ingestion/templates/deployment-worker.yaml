apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metadata.fullname" . }}-worker
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  # When HPA is enabled, replicas field is omitted so the HPA owns the count.
  # If replicas: 1 were set here, every helm upgrade would reset it to 1,
  # fighting the HPA. Same pattern as p1 pcam-inference chart.
  selector:
    matchLabels:
      {{- include "metadata.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "metadata.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          command:
            - celery
            - -A
            - src.workers.tasks
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.worker.concurrency }}
          envFrom:
            - configMapRef:
                name: {{ include "metadata.fullname" . }}-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresSecret }}
                  key: password
            - name: RGW_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }}
                  key: access-key
            - name: RGW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }}
                  key: secret-key
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
