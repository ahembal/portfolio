# In-cluster Postgres StatefulSet + Service + PVC.
# A StatefulSet (not Deployment) because Postgres needs a stable network
# identity and stable persistent storage — both guarantees that StatefulSets
# provide and Deployments do not.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "metadata.fullname" . }}-postgres-pvc
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "metadata.fullname" . }}-postgres
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: metadata-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "metadata.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "metadata.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: meta
            - name: POSTGRES_DB
              value: metadata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresSecret }}
                  key: password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "meta", "-d", "metadata"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: {{ include "metadata.fullname" . }}-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: metadata-postgres
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    {{- include "metadata.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
