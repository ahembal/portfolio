# Only the API gets a Service — the worker consumes from Redis and never
# serves HTTP traffic directly.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "metadata.fullname" . }}-api
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "metadata.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
