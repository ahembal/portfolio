---
# join-node.yml — Join a new worker node to the existing cluster
#
# Usage:
#   # Add new node to inventory/hosts.ini under [workers] first, then:
#   ansible-playbook -i inventory/hosts.ini playbooks/join-node.yml \
#     --limit <new-node-hostname>
#
# The join command is generated fresh (24-hour token TTL).
# Prerequisites: new node has Ubuntu 24.04, SSH key auth configured.

- name: Prepare new worker node
  hosts: "{{ target | default('workers') }}"
  become: true
  roles:
    - common
    - containerd
    - kubeadm

- name: Generate join command on control-plane
  hosts: control_plane
  become: true
  tasks:
    - name: Generate fresh join token
      command: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command locally
      local_action:
        module: copy
        content: "{{ join_command.stdout }}"
        dest: /tmp/kubeadm_join_command.sh
        mode: "0600"

- name: Join new worker to cluster
  hosts: "{{ target | default('workers') }}"
  become: true
  tasks:
    - name: Check if already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Read join command
      local_action:
        module: slurp
        src: /tmp/kubeadm_join_command.sh
      register: join_cmd
      when: not kubelet_conf.stat.exists

    - name: Join cluster
      command: "{{ join_cmd.content | b64decode }}"
      when: not kubelet_conf.stat.exists

    - name: Clean up local join command
      local_action:
        module: file
        path: /tmp/kubeadm_join_command.sh
        state: absent
      become: false
