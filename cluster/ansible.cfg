[defaults]
inventory          = inventory/hosts.ini
roles_path         = roles
remote_user        = ubuntu
private_key_file   = ~/.ssh/id_rsa
host_key_checking  = false          # MAAS nodes get fresh SSH fingerprints on re-provision
stdout_callback    = yaml
bin_ansible_callbacks = true

[privilege_escalation]
become       = true
become_method = sudo
become_user  = root

[ssh_connection]
ssh_args     = -o ControlMaster=auto -o ControlPersist=60s -o ForwardAgent=no
pipelining   = true                 # reduces SSH round-trips; requires requiretty=false in sudoers
