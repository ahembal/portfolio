# Homelab Kubernetes cluster inventory
# Cluster: 1 control-plane + 2 workers, kubeadm, Flannel CNI, K8s v1.29.15
# Updated: 2026-04-21

[control_plane]
clever-fly ansible_host=192.168.1.184

[workers]
quick-thrush ansible_host=192.168.1.200
sought-perch ansible_host=192.168.1.16

[k8s_cluster:children]
control_plane
workers

# sought-perch has a known Flannel VXLAN bug on kernel 6.8.0-101 (fixed in 6.8.0-110)
# that caused pods to exit cleanly (exit 0) every ~7 minutes — CNI sandbox rebuild.
# Do NOT schedule critical workloads (ArgoCD, CoreDNS) on sought-perch.
[stable_workers]
quick-thrush ansible_host=192.168.1.200
