---
# common/tasks/main.yml — Base OS preparation for all K8s nodes
# Applies to: all nodes (control-plane + workers)
# Idempotent: safe to re-run

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - socat          # required by kubeadm preflight
      - conntrack      # required by kube-proxy
      - ipvsadm        # optional but recommended for kube-proxy IPVS mode
      - nfs-common     # for NFS PVs if needed
    state: present

- name: Disable swap (K8s requirement)
  command: swapoff -a
  changed_when: false   # swapoff is idempotent but always exits 0

- name: Remove swap from fstab permanently
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay      # containerd uses overlayfs
    - br_netfilter  # required for iptables to see bridged traffic

- name: Persist kernel modules across reboots
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Set sysctl params for K8s networking
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/k8s.conf
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward",                 value: "1" }
