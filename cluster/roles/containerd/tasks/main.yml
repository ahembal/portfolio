---
# containerd/tasks/main.yml — Install and configure containerd runtime
# K8s requires CRI-compliant runtime; containerd is the standard choice post-Docker.

- name: Add Docker apt signing key (containerd is in Docker's repo)
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install containerd
  apt:
    name: "containerd.io={{ containerd_version }}*"
    state: present
    update_cache: true

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory

- name: Generate default containerd config
  command: containerd config default
  register: containerd_default_config
  changed_when: false

- name: Write containerd config with SystemdCgroup enabled
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_default_config.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}"
  notify: restart containerd

# SystemdCgroup = true is REQUIRED when kubelet uses systemd as its cgroup driver.
# Mismatched cgroup drivers cause kubelet and containerd to track different cgroup
# hierarchies, leading to pod eviction loops and CrashLoopBackOff.

- name: Enable and start containerd
  systemd:
    name: containerd
    state: started
    enabled: true
    daemon_reload: true
