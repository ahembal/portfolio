# CI pipeline for p2-metadata-ingestion
#
# What this does, in order:
#   1. lint-and-test  — ruff + pytest with real Postgres via testcontainers
#   2. build-api      — builds ghcr.io/ahembal/metadata-api and pushes to GHCR
#   3. build-worker   — builds ghcr.io/ahembal/metadata-worker and pushes to GHCR
#   4. update-tags    — writes both SHAs into values.yaml and commits back
#                       so ArgoCD detects drift and syncs the cluster
#
# Why two separate build jobs?
# The api and worker images have different runtime dependencies and change at
# different rates. Building them in parallel halves the CI wall time. Each gets
# its own image tag so a worker-only hotfix doesn't rebuild or redeploy the api.
#
# Why testcontainers in CI?
# Tests use real Postgres (not SQLite) to catch Postgres-specific behaviour
# (UUID types, CHECK constraints, asyncpg). testcontainers spins up a Docker
# container inside the GitHub Actions runner — no external service needed.

name: p2 — Metadata Ingestion

on:
  push:
    branches: [main]
    paths:
      - 'p2-metadata-ingestion/**'
      - '.github/workflows/p2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'p2-metadata-ingestion/**'

env:
  API_IMAGE:    ghcr.io/${{ github.repository_owner }}/metadata-api
  WORKER_IMAGE: ghcr.io/${{ github.repository_owner }}/metadata-worker

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: lint + test
  # Runs pytest with testcontainers — requires Docker socket in the runner,
  # which ubuntu-latest provides. Celery runs in eager mode (no broker needed).
  # ---------------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: p2-metadata-ingestion/requirements-dev.txt

      - name: Install system dependency (libmagic)
        # python-magic is a Python binding for libmagic — the C library must
        # be present in the runner OS before pip install.
        run: sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: pip install -q -r requirements-dev.txt
        working-directory: p2-metadata-ingestion

      - name: Lint — ruff
        run: ruff check --select E,F,I src/
        working-directory: p2-metadata-ingestion

      - name: Test — pytest
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
        working-directory: p2-metadata-ingestion

  # ---------------------------------------------------------------------------
  # Job 2: build + push API image
  # ---------------------------------------------------------------------------
  build-api:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: p2-metadata-ingestion
          file: p2-metadata-ingestion/Dockerfile
          target: runtime
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=p2-api
          cache-to: type=gha,mode=max,scope=p2-api

  # ---------------------------------------------------------------------------
  # Job 3: build + push Worker image
  # Same Dockerfile, different CMD — worker image is built from the same
  # source, tagged separately so worker and api can be deployed independently.
  # ---------------------------------------------------------------------------
  build-worker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: p2-metadata-ingestion
          file: p2-metadata-ingestion/Dockerfile
          target: runtime
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha,scope=p2-worker
          cache-to: type=gha,mode=max,scope=p2-worker

  # ---------------------------------------------------------------------------
  # Job 4: update values.yaml with new image tags
  # Runs only after both builds succeed. Writes short SHAs for both images
  # into values.yaml and commits back — ArgoCD picks up the drift and deploys.
  # ---------------------------------------------------------------------------
  update-tags:
    needs: [build-api, build-worker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update image tags in values.yaml
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VALUES=p2-metadata-ingestion/helm/metadata-ingestion/values.yaml

          # Update api tag
          sed -i "/^  api:/,/^  worker:/{s/tag: .*/tag: \"${SHORT_SHA}\"/}" "${VALUES}"
          # Update worker tag
          sed -i "/^  worker:/,/^imagePullSecrets/{s/tag: .*/tag: \"${SHORT_SHA}\"/}" "${VALUES}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${VALUES}"
          git diff --staged --quiet || git commit -m "ci(p2): update image tags to ${SHORT_SHA}"
          git push
